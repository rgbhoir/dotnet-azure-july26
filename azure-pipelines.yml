trigger:
- main

pool:
  name: 'Default' # Executes code steps directly on your local ATHARVA machine

steps:
# 1. Pull down the GitHub source code repository tree with full history logging
- checkout: self
  fetchDepth: 0

# 2. Initialize and prepare SonarQube Cloud Analysis
- task: SonarCloudPrepare@3
  inputs:
    SonarCloud: 'SonarCloudConnection'
    organization: 'rgbhoir'
    scannerMode: 'dotnet'
    projectKey: 'dotnet-azure-july26-key'
    projectName: 'dotnet-azure-july26'

# 3. Trigger Jenkins on your machine to build the .NET application binaries
- task: JenkinsQueueJob@2
  displayName: 'Hand-off Compile Task to Jenkins'
  inputs:
    serverEndpoint: 'JenkinsConnection' # Matches your saved connection name
    jobName: 'Build-DotNet-App' # Matches your Jenkins job profile name
    captureConsole: true
    capturePipeline: true

# 4. Run the xUnit validation framework tests locally
- task: DotNetCoreCLI@2
  displayName: 'Run xUnit Quality Tests'
  inputs:
    command: 'test'
    projects: 'tests/WebApp.Tests/WebApp.Tests.csproj'
    arguments: '--configuration Release'

# 5. Process and compile metrics tracking for SonarQube Cloud
- task: SonarCloudAnalyze@3
  inputs:
    jdkversion: 'JAVA_HOME_17_X64'

# 6. Publish the analytics dashboard metrics to your profile page
- task: SonarCloudPublish@3
  continueOnError: true
  inputs:
    pollingTimeoutSec: '300'

# 7. Package and drop final compiled app builds inside Azure DevOps
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'
